name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
      - name: Install dependencies
        run: pip install --no-deps -r constraints.txt
      - name: Run deterministic Agent evaluation gate
        env:
          PYTHON_DOTENV_DISABLED: '1'
        run: python scripts/agent_evaluation_gate.py check
      - name: Run deterministic run creation idempotency proof
        env:
          PYTHON_DOTENV_DISABLED: '1'
        run: python scripts/run_creation_idempotency_proof.py check
      - name: Run deterministic run dispatch reconciliation proof
        env:
          PYTHON_DOTENV_DISABLED: '1'
        run: python scripts/run_dispatch_reconciliation_proof.py check
      - name: Run failure cause proof
        run: python scripts/run_failure_cause_proof.py check
      - name: Run secure local runtime proof
        env:
          PYTHON_DOTENV_DISABLED: '1'
        run: python scripts/secure_local_runtime_proof.py check
      - name: Run tests
        env:
          PYTHON_DOTENV_DISABLED: '1'
        run: python -m pytest -q -m "not docker"

  container:
    name: Secure Local Runtime Containers
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            constraints.txt
      - name: Install dependencies
        run: pip install --no-deps -r constraints.txt
      - name: Run required container tests
        env:
          PYTHON_DOTENV_DISABLED: '1'
          DECISION_RESEARCH_AGENT_REQUIRE_DOCKER_TESTS: 'true'
        run: python -m pytest -q -m docker

  frontend:
    name: Frontend Demo Console
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm run test
      - name: Run frontend lint
        working-directory: frontend
        run: npm run lint
      - name: Build frontend
        working-directory: frontend
        run: npm run build
