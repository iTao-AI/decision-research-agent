services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "127.0.0.1:${DECISION_RESEARCH_AGENT_BACKEND_HOST_PORT:-8000}:8000"
    env_file:
      - ${DECISION_RESEARCH_AGENT_COMPOSE_ENV_FILE:-.env}
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      DECISION_RESEARCH_AGENT_DB_PATH: /app/data/decision_research_agent.db
      DECISION_RESEARCH_AGENT_CHECKPOINT_DB_PATH: /app/data/review_checkpoints.db
      DECISION_RESEARCH_AGENT_ENABLE_DURABLE_HITL: ${DECISION_RESEARCH_AGENT_ENABLE_DURABLE_HITL:-false}
      DECISION_RESEARCH_AGENT_ENABLE_EVIDENCE_VERIFICATION: ${DECISION_RESEARCH_AGENT_ENABLE_EVIDENCE_VERIFICATION:-false}
      API_SECRET: ${API_SECRET:?Set API_SECRET for local Compose}
      MYSQL_ROOT_PASSWORD: ""
    volumes:
      - backend_data:/app/data
      - backend_output:/app/output
    depends_on:
      mysql:
        condition: service_healthy
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    # Bind to localhost only — no external network exposure
    ports:
      - "127.0.0.1:${DECISION_RESEARCH_AGENT_MYSQL_HOST_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-decision_research}
      MYSQL_USER: ${MYSQL_USER:-decision_research}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD}
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -uroot -p"$${MYSQL_ROOT_PASSWORD}" --silent
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

volumes:
  backend_data:
  backend_output:
  mysql_data:

networks:
  app-network:
    driver: bridge
